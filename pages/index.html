<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gezond Leven Tracker</title>
  <link rel="stylesheet" href="/styles/style.css">
</head>
<body>

  <header>
    <span class="header-titel">Gezond Leven Tracker</span>
    <button class="menu-knop">☰</button>
  </header>

  <main>
    <h1 class="welkom">Welkom terug</h1>

    <!-- Calorieën teller -->
    <p class="sectie-label">Calorieën teller</p>
    <div class="rij-kaart">
      <span id="calorie-waarde">0 kcal</span>
      <div class="teller-knoppen">
        <button onclick="tellerAanpassen(-50)">−</button>
        <button onclick="tellerAanpassen(+50)">+</button>
      </div>
    </div>

    <!-- Dagelijkse doelen -->
    <p class="sectie-label">Dagelijkse doelen</p>
    <div class="rij-kaart">
      <span>Bewegen (30 min)</span>
      <label class="toggle">
        <input type="checkbox" data-doel="bewegen">
        <span class="slider"></span>
      </label>
    </div>
    <div class="rij-kaart">
      <span>Water (2L)</span>
      <label class="toggle">
        <input type="checkbox" data-doel="water">
        <span class="slider"></span>
      </label>
    </div>
    <div class="rij-kaart">
      <span>Slaap (8 uur)</span>
      <label class="toggle">
        <input type="checkbox" data-doel="slaap">
        <span class="slider"></span>
      </label>
    </div>
  </main>

  <nav>
    <a href="index.html" class="actief">🏠<span>Home</span></a>
    <a href="invoer.html">➕<span>Invoeren</span></a>
    <a href="overzicht.html">📊<span>Overzicht</span></a>
  </nav>

  <script src="/js/app.js"></script>
</body>
</html>
