<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item toevoegen — Gezond Leven Tracker</title>
  <link rel="stylesheet" href="../styles/style.css">
  <link rel="manifest" href="/json/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" href="/icons/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="/icons/icon-192.png" sizes="192x192">
  <meta name="theme-color" content="#2ecc71">
</head>
<body>
  <header>
    <span class="header-titel">Item toevoegen</span>
    <button class="menu-knop">Menu</button>
  </header>
  <main>
    <div class="form-groep">
      <label>Items</label>
      <select id="invoer-categorie">
        <option value="voeding">🍎 Voeding</option>
        <option value="sport">🏃 Sport</option>
        <option value="slaap">😴 Slaap</option>
        <option value="water">💧 Water</option>
        <option value="gewicht">⚖️ Gewicht</option>
      </select>
    </div>
    <div class="form-groep">
      <label>Aantal calorieën (bij eten)</label>
      <input type="number" id="invoer-calorie" placeholder="bv. 500" min="0">
    </div>
    <div class="form-groep">
      <label>Hoeveelheid (ml / gram / portie)</label>
      <input type="number" id="invoer-hoeveelheid" placeholder="bv. 250">
    </div>
    <div class="form-groep">
      <label>Omschrijving (wat je hebt gegeten/gedaan)</label>
      <input type="text" id="invoer-omschrijving" placeholder="bv. Appel, hardlopen...">
    </div>
    <div class="form-groep">
      <label>Categorie (ontbijt, lunch, avond, snack)</label>
      <select id="invoer-maaltijd">
        <option>Ontbijt</option>
        <option>Lunch</option>
        <option>Avondeten</option>
        <option>Snack</option>
      </select>
    </div>
    <div class="tip-kaart">
      <p>💡 Vul je dagelijkse gegevens in voor een goed overzicht van je gezondheid.</p>
    </div>
    <button class="opslaan-knop" onclick="slaOp()">Opslaan</button>
    <p id="succes-melding" class="succes-melding"></p>
  </main>
  <nav>
    <a href="../index.html">Home</a>
    <a href="invoer.html" class="actief">Invoeren</a>
    <a href="overzicht.html">Overzicht</a>
  </nav>
  <script src="../js/app.js"></script>
</body>
</html>
