<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gezond Leven Tracker</title>
  <link rel="stylesheet" href="/Mobiel-app/styles/style.css">
  <link rel="manifest" href="/Mobiel-app/json/manifest.json">
  <meta name="theme-color" content="#2ecc71">
</head>
<body>
  <header>
    <span class="header-titel">Gezond Leven Tracker</span>
    <button id="install-app" class="install-knop">Installeer app</button>
    <button class="menu-knop">Menu</button>
  </header>
  <main>
    <h1 class="welkom">Welkom terug</h1>
    <p class="sectie-label">Calorieën teller</p>
    <div class="rij-kaart">
      <span id="calorie-waarde">0 kcal</span>
      <div class="teller-knoppen">
        <button onclick="tellerAanpassen(-50)">-</button>
        <button onclick="tellerAanpassen(+50)">+</button>
      </div>
    </div>
    <p class="sectie-label">Dagelijkse doelen</p>
    <div class="rij-kaart">
      <span>Bewegen (30 min)</span>
      <label class="toggle">
        <input type="checkbox" data-doel="bewegen">
        <span class="slider"></span>
      </label>
    </div>
    <div class="rij-kaart">
      <span>Water (2L)</span>
      <label class="toggle">
        <input type="checkbox" data-doel="water">
        <span class="slider"></span>
      </label>
    </div>
    <div class="rij-kaart">
      <span>Slaap (8 uur)</span>
      <label class="toggle">
        <input type="checkbox" data-doel="slaap">
        <span class="slider"></span>
      </label>
    </div>
  </main>
  <nav>
    <a href="/Mobiel-app/index.html" class="actief">Home</a>
    <a href="/Mobiel-app/pages/invoer.html">Invoeren</a>
    <a href="/Mobiel-app/pages/overzicht.html">Overzicht</a>
  </nav>
  <script src="/Mobiel-app/js/app.js"></script>
</body>
</html>
